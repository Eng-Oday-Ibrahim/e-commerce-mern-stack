version: "3.9"

services:
  client:
    build:
      context: ./client
    container_name: sudanista-client
    restart: always
    ports:
      - "3002:3000"
    depends_on:
      - server
    env_file:
      - ./client/.env
    environment:
      - NEXT_PUBLIC_API_URL=https://sudanista.net
      - INTERNAL_API_URL=http://sudanista-server:4000

  server:
    build:
      context: ./server
    container_name: sudanista-server
    restart: always
    ports:
      - "4000:4000"
    depends_on:
      - db
      - redis
      - rabbitmq
    env_file:
      - ./server/.env
    environment:
      - DATABASE_URL=mongodb://root:${MONGO_PASSWORD}@db:27017/sudanista?authSource=admin
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - RABBITMQ_URL=amqp://admin:${RABBITMQ_PASSWORD}@rabbitmq:5672

  db:
    image: mongo:7
    container_name: sudanista-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: sudanista-redis
    restart: always
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: sudanista-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  mongo_data:
  redis_data:
  rabbitmq_data: